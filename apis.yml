apis:
  - aid: pulley:pulley-api
    name: Pulley API
    description: REST API for programmatic management of cap table data including
      stakeholders, equity grants, option pools, convertible instruments, vesting
      schedules, and investor reporting. Used by integrations with HRIS platforms
      (Rippling, Gusto, BambooHR, Workday) and custodians (Coinbase Prime, Fireblocks,
      BitGo).
