aid: pulley
name: Pulley
description: Cap table management platform for startups and finance leaders, providing
  a REST API for managing equity, modeling dilution, issuing options and RSUs, tracking
  SAFEs and convertible instruments, and generating investor and compliance reports.
  Pulley supports both equity and token cap tables with integrations to leading HRIS
  platforms, custodians, and legal tools.
type: Index
